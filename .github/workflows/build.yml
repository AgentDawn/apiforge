name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Rust CLI - cross-platform build
  build-cli:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: apiforge-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: apiforge-linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: apiforge-darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: apiforge-darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: apiforge-win32-x64.exe

    runs-on: ${{ matrix.os }}
    name: Build CLI (${{ matrix.artifact }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/apiforge-rs/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('packages/apiforge-rs/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release
        working-directory: packages/apiforge-rs
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp packages/apiforge-rs/target/${{ matrix.target }}/release/apiforge ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: |
          copy packages\apiforge-rs\target\${{ matrix.target }}\release\apiforge.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # Rust tests
  test-cli:
    runs-on: ubuntu-latest
    name: Test CLI (Rust)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/apiforge-rs/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('packages/apiforge-rs/Cargo.lock') }}
      - name: Run tests
        working-directory: packages/apiforge-rs
        run: cargo test

  # Web e2e tests
  test-web:
    runs-on: ubuntu-latest
    name: Test Web (Playwright)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: packages/web
        run: npm install

      - name: Install Playwright browsers
        working-directory: packages/web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: packages/web
        run: npx playwright test --project=apiforge --project=json-editor --project=themes --project=search --project=env-variables --project=body-types --project=query-params --project=curl-share --project=auth-types --project=examples --project=docs-mode --project=request-tabs --project=source-traceability --project=openapi-responses --project=save-as-doc --project=schema-examples --project=response-insights --project=response-field-hide --project=request-history --project=collections-auto-save --project=sidebar-toggle

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/playwright-report/
