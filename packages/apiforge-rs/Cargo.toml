[workspace]
members = [
    "crates/apiforge-cli",
    "crates/apiforge-core",
    "crates/apiforge-spec",
    "crates/apiforge-grpc",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
regex = "1"
walkdir = "2"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["rustls-tls", "multipart", "cookies", "json"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
dirs = "5"
base64 = "0.22"
url = "2"
crossterm = "0.28"
shell-words = "1"
anyhow = "1"
