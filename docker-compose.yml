services:
  rqlite:
    image: rqlite/rqlite:latest
    ports:
      - "4001:4001"
    tmpfs:
      - /rqlite/file/data
    command: ["-node-id", "1"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4001/readyz"]
      interval: 2s
      timeout: 3s
      retries: 10

  server:
    image: ghcr.io/agentdawn/apiforge/server:latest
    build: ./packages/server
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - RQLITE_URL=http://rqlite:4001
      - JWT_SECRET=${JWT_SECRET:-apiforge-dev-secret-change-in-production}
      - APIFORGE_LOCALHOST_REWRITE=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rqlite:
        condition: service_healthy

  web:
    image: ghcr.io/agentdawn/apiforge/web:latest
    build: ./packages/web
    ports:
      - "3000:3000"
    depends_on:
      - server
